
<!DOCTYPE html>
<html>
<head>
<title>ULTRA v7 Mission Control</title>
<style>
body { background:black; color:#0f0; font-family:monospace; }
.panel { border:1px solid #0f0; padding:10px; margin:10px; }
</style>
</head>
<body>

<h1>ULTRA v7 Cockpit</h1>

<div class="panel" id="alt"></div>
<div class="panel" id="vel"></div>
<div class="panel" id="att"></div>

<script>
const ws = new WebSocket("ws://localhost:4000");

ws.onmessage = (e)=>{
  const d = JSON.parse(e.data);
  document.getElementById("alt").innerText = "Altitude: " + d.altitude;
  document.getElementById("vel").innerText = "Velocity: " + d.velocity;
  document.getElementById("att").innerText =
    "Pitch: "+d.pitch+" Roll: "+d.roll+" Yaw: "+d.yaw;
};
</script>

</body>
</html>
